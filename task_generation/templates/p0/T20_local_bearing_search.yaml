# T20 – Local Bearing Search  (merged T22 Local Target Confirmation)
# "There's a chair somewhere to your left — can you find it and confirm its colour?"
# Target is not answerably visible at init; agent must turn/move to bring it into view.

template_id: T20
name: local_bearing_search
subclass: C2.3
priority: P0
description: >
  The target object is in the same room but not answerably visible at init.
  A coarse bearing hint (left/right/behind/ahead) is given; the agent must
  navigate to confirm the object's presence and answer a visual property question.
  Merged with T22 (target confirmation): both require moving to a BearingWithin region.

question_templates:
  - "Find the nearby object — is it {choice_a} or {choice_b}?"

answer_type: categorical
answer_choices_generator: property_choices   # target label vs distractor

gt_from: target_label

trigger:
  # At init: target has fewer than 2 visible corners, so it cannot be answered directly.
  target_invisible_at_init: true
  # Bearing hint sector: the target is strictly within [init_bearing ± 45°, init_bearing ± 135°]
  bearing_hint_accuracy_deg: 45   # hint sector half-width

init_view:
  visible_anchors: ["{{target_id}}"]

# ---------- Evidence slots ----------
evidence_slots:
  - slot_id: target_in_view
    region_generator: bearing_sector_in_room
    region_args:
      target: "{{target_id}}"
      room: "{{room_id}}"
      bearing_sector_deg: 45     # target must be within ±45° of camera forward
    predicates:
      - {name: Visible,       args: {obj: "{{target_id}}", min_corners: 4, max_occ: 0.30}}
      - {name: BearingWithin, args: {obj: "{{target_id}}", theta_deg: 45}}
      - {name: Centered,      args: {obj: "{{target_id}}", theta_deg: 35}}
      - {name: DistanceBand,  args: {obj: "{{target_id}}", d_min: 0.5, d_max: 5.0}}
    threshold: 1.0

coverage_aggregator: all
min_coverage_for_credit: 1.0

scene_requirements:
  min_objects: 1
  target_out_of_fov_at_init: true
  same_room_as_init: true

action_config:
  move_m: 0.50
  turn_deg: 45
  look_deg: 15
max_steps: 8
gamma: 0.95
